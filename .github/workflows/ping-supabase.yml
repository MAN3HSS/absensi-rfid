# ============================================================
# PING SUPABASE — Setiap 4 hari
# + Auto-commit agar GitHub Actions tidak pernah berhenti
# ============================================================

name: Ping Supabase

on:
  schedule:
    # Setiap 4 hari, jam 06:00 WIB (23:00 UTC)
    - cron: '0 23 */4 * *'

  # Tombol manual
  workflow_dispatch:

# Izin untuk commit & push balik ke repo
permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout repositori ──
      - name: 📥 Checkout Repositori
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Ping Supabase ──
      - name: 🏓 Ping Supabase Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "⏰ Ping dimulai: $(date '+%Y-%m-%d %H:%M:%S UTC')"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/settings?select=id&limit=1")

          echo "📡 Response code: $RESPONSE"

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "206" ]; then
            echo "✅ Supabase aktif!"
            echo "STATUS=✅ Berhasil (HTTP $RESPONSE)" >> $GITHUB_ENV
          else
            echo "❌ Ping gagal! Response: $RESPONSE"
            echo "STATUS=❌ Gagal (HTTP $RESPONSE)" >> $GITHUB_ENV
            exit 1
          fi

      # ── 3. Tulis timestamp ke file ──
      # Ini yang membuat repositori selalu "aktif"
      # sehingga GitHub Actions tidak pernah dinonaktifkan
      - name: 📝 Update Timestamp (Jaga Repo Tetap Aktif)
        run: |
          mkdir -p .github
          echo "Last ping: $(date '+%Y-%m-%d %H:%M:%S UTC') | $STATUS" > .github/last-ping.txt
          echo "Ping berikutnya: 4 hari lagi" >> .github/last-ping.txt
          cat .github/last-ping.txt

      # ── 4. Commit & push timestamp ──
      - name: 🔄 Commit & Push (Aktivitas Repo)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-ping.txt

          # Hanya commit jika ada perubahan
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan, skip commit."
          else
            git commit -m "🏓 Auto-ping Supabase $(date '+%Y-%m-%d')"
            git push
            echo "✅ Commit berhasil — repo tetap aktif!"
          fi

      - name: 🏁 Selesai
        run: |
          echo "================================"
          echo " Ping Supabase : $STATUS"
          echo " Repo aktif    : ✅ Ya"
          echo " Waktu         : $(date '+%Y-%m-%d %H:%M UTC')"
          echo "================================"
